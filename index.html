
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers" id="lotto-numbers">
            <!-- Numbers will be generated here -->
        </div>
        <button id="generate-btn">Generate Numbers</button>

        <div class="inquiry-section">
            <hr>
            <h3>Business Inquiry</h3>
            <form action="https://formspree.io/f/xeergjdj" method="POST" id="inquiry-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
